name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Tauri
        run: |
          cd frontend
          npm run tauri:build

      - name: Upload Linux artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/rpm/*.rpm
          draft: true
          tag_name: ${{ github.ref_name }}
          name: PrisonSIS ${{ github.ref_name }}
          body: |
            PrisonSIS 监狱审讯笔录系统 Tauri 版本

            ### 支持平台
            - Linux x64 (deb, rpm)

            ### 主要功能
            - 服刑人员管理
            - 笔录制作与管理
            - 审批流程
            - 数据统计
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: build-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Tauri
        run: |
          cd frontend
          npm run tauri:build

      - name: Upload Windows artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          tag_name: ${{ github.ref_name }}
          name: PrisonSIS ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
