name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'PrisonSIS v__VERSION__'
          releaseBody: |
            PrisonSIS 监狱审讯笔录系统 Tauri 版本

            ### 支持平台
            - Windows x64
            - Linux (ARM64)

            ### 主要功能
            - 服刑人员管理
            - 笔录制作与管理
            - 审批流程
            - 数据统计
          releaseDraft: true
          prerelease: false

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'PrisonSIS v__VERSION__'
          releaseBody: |
            PrisonSIS 监狱审讯笔录系统 Tauri 版本

            ### 支持平台
            - Windows x64
            - Linux (ARM64)

            ### 主要功能
            - 服刑人员管理
            - 笔录制作与管理
            - 审批流程
            - 数据统计
          releaseDraft: true
          prerelease: false
